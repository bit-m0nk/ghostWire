<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GhostWire — Installation Error</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#08090f;color:#e2e8f0;min-height:100vh;padding:32px 20px}
.wrap{max-width:620px;margin:0 auto;text-align:center}
.icon{font-size:48px;margin-bottom:14px}
h1{font-size:22px;font-weight:800;color:#f87171;margin-bottom:6px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
.err-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:14px 16px;font-family:monospace;font-size:13px;color:#f87171;text-align:left;margin-bottom:20px;word-break:break-all}
.log-box{background:#08090f;border:1px solid #1e2a3a;border-radius:10px;padding:14px;height:280px;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.7;color:#94a3b8;text-align:left;margin-bottom:24px}
.btn{display:inline-block;background:#1e2a3a;color:#e2e8f0;border:1px solid #2d3a4a;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.btn:hover{border-color:#6366f1;color:#6366f1}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">💀</div>
  <h1>Installation failed</h1>
  <p class="sub">Something went wrong. Check the log below and try again.</p>
  <div class="err-box">{{ error }}</div>
  <div class="log-box" id="log">
    {% for line in log_lines %}
    <div>{{ line | safe }}</div>
    {% endfor %}
  </div>
  <form action="/reset" method="post">
    <button type="submit" class="btn">← Try Again</button>
  </form>
</div>
<script>document.getElementById('log').scrollTop=9999</script>
</body>
</html>
